services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    volumes:
      - sentry-data:/app/server/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development services (optional)
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - "5173:5173"
      - "3001:3001"
    volumes:
      - ./client/src:/app/client/src
      - ./server/src:/app/server/src
    command: npm run dev
    environment:
      - NODE_ENV=development
    profiles:
      - dev

volumes:
  sentry-data:
